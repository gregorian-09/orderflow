name: Publish Rust Crates

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish --dry-run only"
        required: true
        default: true
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Dry run publish order
        if: inputs.dry_run
        run: |
          set -euo pipefail
          for crate in of_core of_signals of_persist of_adapters of_runtime of_ffi_c; do
            cargo publish -p "$crate" --dry-run
          done

      - name: Publish crates.io
        if: ${{ !inputs.dry_run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          for crate in of_core of_signals of_persist of_adapters of_runtime of_ffi_c; do
            cargo publish -p "$crate"
            sleep 30
          done
