name: Publish Rust Crates

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish --dry-run only"
        required: true
        default: true
        type: boolean
  push:
    branches:
      - "main"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: ./.github/actions/setup-rust

      - name: Validate crate packages
        if: github.event_name == 'push' || inputs.dry_run
        run: |
          set -euo pipefail
          for crate in of_core of_signals of_persist of_adapters of_runtime of_ffi_c; do
            cargo check -p "$crate"
          done

      - name: Publish crates.io
        if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          for crate in of_core of_signals of_persist of_adapters of_runtime of_ffi_c; do
            pkgid="$(cargo pkgid -p "$crate" 2>/dev/null || true)"
            version="${pkgid##*#}"
            if [ "$version" = "$pkgid" ]; then
              version="${pkgid##*@}"
            fi
            if [ -z "$pkgid" ] || [ -z "$version" ] || [ "$version" = "$pkgid" ]; then
              echo "Could not resolve version for crate ${crate} via cargo pkgid."
              exit 1
            fi
            status_code="$(curl -sS -o /tmp/${crate}-${version}.json -w "%{http_code}" "https://crates.io/api/v1/crates/${crate}/${version}")"
            if [ "$status_code" = "200" ]; then
              echo "Skipping ${crate} v${version}; already published."
              continue
            fi
            if [ "$status_code" != "404" ]; then
              echo "Unexpected crates.io status while checking ${crate} v${version}: HTTP ${status_code}"
              cat /tmp/${crate}-${version}.json || true
              exit 1
            fi
            cargo publish -p "$crate"
            sleep 30
          done
