name: Publish Rust Crates

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish --dry-run only"
        required: true
        default: true
        type: boolean
  push:
    branches:
      - "main"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: ./.github/actions/setup-rust

      - name: Validate crate packages
        if: github.event_name == 'push' || inputs.dry_run
        run: |
          set -euo pipefail
          for crate in of_core of_signals of_persist of_adapters of_runtime of_ffi_c; do
            cargo check -p "$crate"
          done

      - name: Publish crates.io
        if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          for crate in of_core of_signals of_persist of_adapters of_runtime of_ffi_c; do
            set +e
            publish_output="$(cargo publish -p "$crate" 2>&1)"
            publish_status=$?
            set -e
            echo "$publish_output"
            if [ $publish_status -eq 0 ]; then
              sleep 30
              continue
            fi
            if echo "$publish_output" | grep -Eqi "already (uploaded|exists|published)"; then
              echo "Skipping ${crate}; this version is already published."
              continue
            fi
            if echo "$publish_output" | grep -Eqi "Too Many Requests|published too many new crates"; then
              echo "::error::Crates publish rate limit hit. Re-run this workflow after the retry time in the cargo error."
            fi
            exit $publish_status
          done
