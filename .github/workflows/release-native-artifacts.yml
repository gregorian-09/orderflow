name: Release Native Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release library
        run: cargo build -p of_ffi_c --release --features "binance rithmic cqg"

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist/include dist/lib
          cp crates/of_ffi_c/include/orderflow.h dist/include/
          case "$RUNNER_OS" in
            Linux)
              cp target/release/libof_ffi_c.so dist/lib/
              ;;
            macOS)
              cp target/release/libof_ffi_c.dylib dist/lib/
              ;;
            Windows)
              cp target/release/of_ffi_c.dll dist/lib/
              ;;
            *)
              echo "Unsupported OS: $RUNNER_OS" >&2
              exit 1
              ;;
          esac

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: of_ffi_c-${{ runner.os }}
          path: dist/**

  attach-release-assets:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: false

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/include/orderflow.h
            release-assets/**/lib/*
