name: Publish Python

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Target package index"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi
          - testpypi
  push:
    branches:
      - "main"
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build twine
          python -m build bindings/python --sdist --wheel --outdir dist

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload --repository-url https://test.pypi.org/legacy/ dist/*

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload dist/*
