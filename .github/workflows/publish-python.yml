name: Publish Python

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Target package index"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi
          - testpypi
  push:
    branches:
      - "main"
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build package
        shell: bash
        run: |
          python -m pip install --upgrade pip build twine
          python -m build bindings/python --sdist --outdir dist
          cargo build --release -p of_ffi_c
          mkdir -p bindings/python/orderflow/native
          cp target/release/libof_ffi_c.so bindings/python/orderflow/native/
          python -m pip install --upgrade wheel
          python -m build bindings/python --wheel --outdir dist
          python -m wheel tags --remove --python-tag py3 --abi-tag none --platform-tag manylinux2014_x86_64 dist/*.whl

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload --skip-existing --repository-url https://test.pypi.org/legacy/ dist/*

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload --skip-existing dist/*
