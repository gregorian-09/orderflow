name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - "rithmic"
          - "binance"
          - "cqg"
          - "cqg cqg_proto"
          - "rithmic cqg"
          - "binance cqg"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: ./.github/actions/setup-rust
      - name: Test adapters matrix
        run: cargo test -q -p of_adapters --features "${{ matrix.features }}"
      - name: Test workspace
        run: cargo test -q

  docs-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: ./.github/actions/setup-rust
      - name: Enforce documentation coverage
        run: python3 tools/docs_coverage.py --enforce

  python-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Python binding syntax
        run: python3 -m py_compile bindings/python/orderflow/_ffi.py bindings/python/orderflow/api.py

  java-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Compile Java binding
        run: mvn -q -f bindings/java/pom.xml -DskipTests compile
