name: CI

on:
  push:
  pull_request:

jobs:
  semver:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - of_core
          - of_adapters
          - of_signals
          - of_persist
          - of_runtime
          - of_ffi_c
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: ./.github/actions/setup-rust
      - name: Check semver compatibility
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: ${{ matrix.package }}
          # The workspace is still in the 0.x line. Minor bumps in this phase
          # are allowed to carry semver-breaking Rust API changes while we
          # stabilize toward 1.0.
          release-type: major

  rust:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - "rithmic"
          - "binance"
          - "cqg"
          - "cqg cqg_proto"
          - "rithmic cqg"
          - "binance cqg"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: ./.github/actions/setup-rust
      - name: Test adapters matrix
        run: cargo test -q -p of_adapters --features "${{ matrix.features }}"
      - name: Test workspace
        run: cargo test -q

  ffi-exports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: ./.github/actions/setup-rust
      - name: Build C ABI library
        run: cargo build -q -p of_ffi_c
      - name: Verify exported C ABI symbols
        run: ./tools/check_ffi_exports.sh target/debug/libof_ffi_c.so

  docs-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: ./.github/actions/setup-rust
      - name: Enforce documentation coverage
        run: python3 tools/docs_coverage.py --enforce

  python-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: ./.github/actions/setup-rust
      - name: Build C ABI library
        run: cargo build -q -p of_ffi_c
      - name: Validate Python binding syntax
        run: python3 -m py_compile bindings/python/orderflow/_ffi.py bindings/python/orderflow/api.py
      - name: Smoke Python binding
        run: python3 tools/smoke_python_binding.py

  java-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: ./.github/actions/setup-rust
      - name: Build C ABI library
        run: cargo build -q -p of_ffi_c
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Compile Java binding
        run: mvn -q -f bindings/java/pom.xml -DskipTests compile
      - name: Copy Java runtime dependencies
        run: mvn -q -f bindings/java/pom.xml -DskipTests dependency:copy-dependencies -DincludeScope=runtime
      - name: Smoke Java binding
        run: java -cp bindings/java/target/classes:bindings/java/target/dependency/* com.orderflow.examples.BindingSmokeExample
